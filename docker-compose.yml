name: lunaria

services:
  postgres:
    image: postgres:16-alpine
    container_name: lunaria-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-lunaria}
      POSTGRES_USER: ${POSTGRES_USER:-lunaria}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-lunaria}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - lunaria_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7-alpine
    container_name: lunaria-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - lunaria_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

volumes:
  lunaria_postgres_data:
  lunaria_redis_data:

